version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: smartserver_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-smartuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartpass}
      POSTGRES_DB: ${POSTGRES_DB:-smartdb}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smartuser} -d ${POSTGRES_DB:-smartdb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  smartserver:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartserver_app
    environment:
      DATABASE_DNS: postgres://${POSTGRES_USER:-smartuser}:${POSTGRES_PASSWORD:-smartpass}@postgres:5432/${POSTGRES_DB:-smartdb}?sslmode=disable
      GIN_MODE: ${GIN_MODE:-release}
    ports:
      - "${APP_PORT:-3663}:3663"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
